<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House & Life Manager</title>
  <style>
    :root {
      --bg-color: #f4f4f9;
      --card-bg: #ffffff;
      --text-main: #333333;
      --text-sub: #666666;
      --primary-btn: #4CAF50;
      --primary-hover: #45a049;
      --action-btn: #0066cc;
      --action-hover: #005bb5;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    .status-msg {
      text-align: center;
      font-size: 0.9em;
      margin-bottom: 15px;
      color: var(--action-btn);
      height: 20px;
      font-weight: bold;
    }
    .add-form-container {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      max-width: 600px;
      margin: 0 auto 20px auto;
    }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .form-input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex: 1; font-size: 1em; }
    .add-btn {
      background-color: var(--action-btn);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 1em;
    }
    .task-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    .task-card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 15px 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 6px solid #ccc;
    }
    .task-card.due-soon { border-left-color: #ffb74d; }
    .task-card.overdue { border-left-color: #ef5350; }
    .task-card.good { border-left-color: #66bb6a; }
    .task-card.reminder { border-left-color: #ba68c8; }
    .task-info { flex-grow: 1; }
    .task-title { font-size: 1.1em; font-weight: bold; margin: 0 0 5px 0; }
    .task-meta { font-size: 0.85em; color: var(--text-sub); margin: 0; }
    .type-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: bold;
      margin-right: 5px;
      text-transform: uppercase;
    }
    .type-reminder { background-color: #f3e5f5; color: #8e24aa; }
    .type-task { background-color: #e3f2fd; color: #1565c0; }
    .complete-btn {
      background-color: var(--primary-btn);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      font-size: 0.9em;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Manager</h1>
  <div id="statusMessage" class="status-msg">Initial loading...</div>

  <div class="add-form-container">
    <h3 style="margin-top: 0;">Add New Item</h3>
    <div class="form-row">
      <input type="text" id="newItemTitle" class="form-input" placeholder="Title (e.g., Take Medicine)">
    </div>
    <div class="form-row">
      <select id="newItemType" class="form-input">
        <option value="task">Task (Takes Time)</option>
        <option value="reminder">Reminder (Quick)</option>
      </select>
      <input type="number" id="newItemDuration" class="form-input" placeholder="Mins">
    </div>
    <div class="form-row">
      <input type="number" id="newItemFreq" class="form-input" placeholder="Repeat days">
      <input type="date" id="newItemEndDate" class="form-input">
    </div>
    <button onclick="addNewItem()" class="add-btn">Add to Tracker</button>
  </div>

  <div id="taskList" class="task-container"></div>

  <script>
 // --- CONFIG ---
    // Instead of hardcoding, we ask the browser if it remembers the token
    let GITHUB_TOKEN = localStorage.getItem('my_house_token');

    // If it doesn't remember it (like your first time opening the app), prompt for it
    if (!GITHUB_TOKEN) {
      GITHUB_TOKEN = prompt("Enter your GitHub Personal Access Token:");
      localStorage.setItem('my_house_token', GITHUB_TOKEN);
    }

    const OWNER = 'scottscalici';
    const REPO = 'loquesea';
    const PATH = 'planner/house.json';
    const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;
    
    let houseData = { house_tasks: [] };
    let currentSha = null;

    // --- UTILITIES ---
    function setStatus(msg) {
      const statusElement = document.getElementById('statusMessage');
      if (statusElement) statusElement.textContent = msg;
    }

    // --- CORE LOGIC ---
    async function fetchTasks() {
      setStatus("Fetching from GitHub...");
      try {
        const response = await fetch(API_URL, {
          headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!response.ok) throw new Error(`Error: ${response.status}`);
        const data = await response.json();
        currentSha = data.sha;
        const decoded = decodeURIComponent(escape(atob(data.content)));
        houseData = JSON.parse(decoded);
        renderTasks();
        setStatus("Ready");
      } catch (e) {
        console.error(e);
        setStatus("Load Error. Check Token.");
      }
    }

  function renderTasks() {
      const container = document.getElementById('taskList');
      container.innerHTML = '';
      const now = new Date();
      now.setHours(0,0,0,0);

      const active = (houseData.house_tasks || []).filter(t => t.is_active);
      active.sort((a, b) => new Date(a.next_due) - new Date(b.next_due));

      active.forEach(task => {
        const dueDate = new Date(task.next_due);
        dueDate.setHours(0,0,0,0);
        const days = Math.round((dueDate - now) / 86400000);
        
        // NEW: Fallback to 'task' if the type is missing in the JSON
        const safeType = task.type || 'task'; 
        
        let sClass = safeType === 'reminder' ? "reminder" : "good";
        if (days < 0) sClass = "overdue";
        else if (days <= 2 && safeType !== 'reminder') sClass = "due-soon";

        const card = document.createElement('div');
        card.className = `task-card ${sClass}`;
        card.innerHTML = `
          <div class="task-info">
            <p class="task-title">${task.title}</p>
            <p class="task-meta">
              <span class="type-badge type-${safeType}">${safeType}</span>
              Due: ${days === 0 ? 'Today' : (days === 1 ? 'Tomorrow' : days + ' days')}
            </p>
          </div>
          <button class="complete-btn" onclick="completeTask('${task.id}')">Done</button>
        `;
        container.appendChild(card);
      });
    }
    async function addNewItem() {
      const title = document.getElementById('newItemTitle').value;
      if (!title) return alert("Title required");
      
      const newItem = {
        id: `id_${Date.now()}`,
        title: title,
        type: document.getElementById('newItemType').value,
        duration_minutes: parseInt(document.getElementById('newItemDuration').value) || 0,
        frequency_days: parseInt(document.getElementById('newItemFreq').value) || 0,
        next_due: new Date().toISOString(),
        is_active: true
      };

      const end = document.getElementById('newItemEndDate').value;
      if (end) newItem.end_date = new Date(end).toISOString();

      houseData.house_tasks.push(newItem);
      renderTasks();
      await saveTasks();
    }

    async function completeTask(id) {
      const idx = houseData.house_tasks.findIndex(t => t.id === id);
      const t = houseData.house_tasks[idx];
      
      if (!t.frequency_days && !t.anchor_day) {
        t.is_active = false;
      } else {
        const next = new Date();
        next.setDate(next.getDate() + (t.frequency_days || 7));
        next.setHours(0,0,0,0);
        t.next_due = next.toISOString();
        if (t.end_date && next > new Date(t.end_date)) t.is_active = false;
      }
      renderTasks();
      await saveTasks();
    }

    async function saveTasks() {
      setStatus("Saving...");
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(houseData, null, 2))));
      try {
        const res = await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: "Update", content, sha: currentSha })
        });
        const d = await res.json();
        currentSha = d.content.sha;
        setStatus("Saved");
      } catch (e) { setStatus("Save Failed"); }
    }

    fetchTasks();
  </script>
</body>
</html>
