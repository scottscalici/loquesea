<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House & Life Manager</title>
  <style>
    :root {
      --bg-color: #f4f4f9;
      --card-bg: #ffffff;
      --text-main: #333333;
      --text-sub: #666666;
      --primary-btn: #0066cc;
      --primary-hover: #005bb5;
      --action-btn: #0066cc;
      --action-hover: #005bb5;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    
    .status-msg {
      text-align: center;
      font-size: 0.9em;
      margin-bottom: 15px;
      color: var(--action-btn);
      height: 20px;
      font-weight: bold;
    }
    
    .add-form-container {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      max-width: 600px;
      margin: 0 auto 20px auto;
    }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;}
    .form-input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex: 1; font-size: 1em; min-width: 120px;}
    .input-group { display: flex; flex-direction: column; flex: 1; }
    .input-label { font-size: 0.8em; color: var(--text-sub); margin-bottom: 3px; font-weight: bold; }
    
    .add-btn {
      background-color: var(--action-btn);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 1em;
      margin-top: 5px;
    }
    
    .task-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    .task-card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 15px 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 8px solid #ccc; 
    }
    
    .color-black { border-left-color: #000000; } 
    .color-red { border-left-color: #d32f2f; }   
    .color-orange { border-left-color: #f57c00; } 
    .color-yellow { border-left-color: #fbc02d; } 
    .color-green { border-left-color: #388e3c; }  
    .color-blue { border-left-color: #1976d2; }   
    .color-purple { border-left-color: #7b1fa2; } 

    .task-info { flex-grow: 1; }
    .task-title { font-size: 1.1em; font-weight: bold; margin: 0 0 5px 0; }
    .task-meta { font-size: 0.85em; color: var(--text-sub); margin: 0; }
    
    .type-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: bold;
      margin-right: 5px;
      text-transform: uppercase;
    }
    .type-reminder { background-color: #f3e5f5; color: #8e24aa; }
    .type-task { background-color: #e3f2fd; color: #1565c0; }
    
    .complete-btn {
      background-color: var(--primary-btn);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      font-size: 0.9em;
      font-weight: bold;
      cursor: pointer;
      margin-left: 10px;
    }

    .date-edit-input {
      border: 1px solid transparent;
      background: transparent;
      font-family: inherit;
      color: var(--text-main);
      font-size: 0.9em;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      outline: none;
      font-weight: bold;
    }
    .date-edit-input:hover, .date-edit-input:focus {
      background: #e8e8e8;
      border-color: #ccc;
    }
  </style>
</head>
<body>

  <h1>Manager</h1>
  <div id="statusMessage" class="status-msg">Initial loading...</div>

  <div class="add-form-container">
    <h3 style="margin-top: 0; margin-bottom: 15px;">Add New Item</h3>
    
    <div class="form-row">
      <input type="text" id="newItemTitle" class="form-input" placeholder="Title (e.g., Take Medicine)">
    </div>
    
    <div class="form-row">
      <div class="input-group">
        <span class="input-label">Type</span>
        <select id="newItemType" class="form-input">
          <option value="task">Task</option>
          <option value="reminder">Reminder</option>
        </select>
      </div>
      <div class="input-group">
        <span class="input-label">Mins (If Task)</span>
        <input type="number" id="newItemDuration" class="form-input" placeholder="0">
      </div>
      <div class="input-group">
        <span class="input-label">Repeat Every X Days</span>
        <input type="number" id="newItemFreq" class="form-input" placeholder="Default: 1">
      </div>
    </div>
    
    <div class="form-row">
      <div class="input-group">
        <span class="input-label">Start Date (Optional)</span>
        <input type="date" id="newItemStartDate" class="form-input">
      </div>
      <div class="input-group">
        <span class="input-label">End Date (Optional)</span>
        <input type="date" id="newItemEndDate" class="form-input">
      </div>
    </div>
    
    <button onclick="addNewItem()" class="add-btn">Add to Tracker</button>
  </div>

  <div id="taskList" class="task-container"></div>

  <script>
    let GITHUB_TOKEN = localStorage.getItem('my_house_token');
    if (!GITHUB_TOKEN) {
      GITHUB_TOKEN = prompt("Enter your GitHub Personal Access Token (starts with ghp_):");
      if (GITHUB_TOKEN) localStorage.setItem('my_house_token', GITHUB_TOKEN);
    }

    const OWNER = 'scottscalici';
    const REPO = 'loquesea';
    const PATH = 'planner/house.json';
    const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

    let houseData = { house_tasks: [] };
    let currentSha = null;

    function setStatus(msg) {
      const statusElement = document.getElementById('statusMessage');
      if (statusElement) statusElement.textContent = msg;
    }

    async function fetchTasks() {
      setStatus("Fetching from GitHub...");
      try {
        const response = await fetch(API_URL, {
          headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!response.ok) throw new Error(`Error: ${response.status}`);
        const data = await response.json();
        currentSha = data.sha;
        const decoded = decodeURIComponent(escape(atob(data.content)));
        houseData = JSON.parse(decoded);
        renderTasks();
        setStatus("Ready");
        setTimeout(() => setStatus(""), 3000);
      } catch (e) {
        console.error(e);
        setStatus("Load Error. Check Token.");
      }
    }

    function renderTasks() {
      const container = document.getElementById('taskList');
      container.innerHTML = '';
      const now = new Date();
      now.setHours(0,0,0,0);

      const active = (houseData.house_tasks || []).filter(t => t.is_active);
      active.sort((a, b) => new Date(a.next_due) - new Date(b.next_due));

      active.forEach(task => {
        const dueDate = new Date(task.next_due);
        dueDate.setHours(0,0,0,0);
        const days = Math.round((dueDate - now) / 86400000);
        
        const safeType = task.type || 'task'; 
        
        let sClass = "";
        if (days < 0) sClass = "color-black";
        else if (days === 0) sClass = "color-red";
        else if (days === 1) sClass = "color-orange";
        else if (days === 2) sClass = "color-yellow";
        else if (days >= 3 && days <= 6) sClass = "color-green";
        else if (days >= 7 && days <= 30) sClass = "color-blue";
        else sClass = "color-purple"; 

        const yyyy = dueDate.getFullYear();
        const mm = String(dueDate.getMonth() + 1).padStart(2, '0');
        const dd = String(dueDate.getDate()).padStart(2, '0');
        const formattedDate = `${yyyy}-${mm}-${dd}`;

        let relativeText = days === 0 ? 'Today' : (days === 1 ? 'Tomorrow' : (days < 0 ? Math.abs(days) + ' days ago' : 'In ' + days + ' days'));

        const card = document.createElement('div');
        card.className = `task-card ${sClass}`;
        card.innerHTML = `
          <div class="task-info">
            <p class="task-title">${task.title}</p>
            <p class="task-meta" style="display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 5px;">
              <span class="type-badge type-${safeType}">${safeType}</span>
              By: <input type="date" class="date-edit-input" value="${formattedDate}" onchange="changeDueDate('${task.id}', this.value)">
              <span style="font-size: 0.85em; opacity: 0.8;">(${relativeText})</span>
            </p>
          </div>
          <button class="complete-btn" onclick="completeTask('${task.id}')">Done</button>
        `;
        container.appendChild(card);
      });
    }

    async function changeDueDate(taskId, newDateStr) {
      if (!newDateStr) return; 
      setStatus("Updating date...");
      const taskIndex = houseData.house_tasks.findIndex(t => t.id === taskId);
      if (taskIndex === -1) return;

      const parts = newDateStr.split('-');
      const localDate = new Date(parts[0], parts[1] - 1, parts[2]);
      
      houseData.house_tasks[taskIndex].next_due = localDate.toISOString();
      renderTasks();
      await saveTasks();
    }

    async function addNewItem() {
      const title = document.getElementById('newItemTitle').value;
      if (!title) return alert("Title required");
      
      const freqRaw = document.getElementById('newItemFreq').value;
      
      // ABSOLUTE FAILSAFE: If not a number, default to 1. If literally "0", keep 0.
      let freqDays = 1;
      if (freqRaw.trim() === "0") {
        freqDays = 0;
      } else if (!isNaN(parseInt(freqRaw))) {
        freqDays = parseInt(freqRaw);
      }

      // Handle Start Date Math (Default to today if blank)
      let initialDue = new Date();
      initialDue.setHours(0,0,0,0);
      
      const startRaw = document.getElementById('newItemStartDate').value;
      if (startRaw && startRaw.trim() !== "") {
        const sParts = startRaw.split('-');
        initialDue = new Date(sParts[0], sParts[1] - 1, sParts[2], 0, 0, 0);
      }

      const newItem = {
        id: `id_${Date.now()}`,
        title: title,
        type: document.getElementById('newItemType').value,
        duration_minutes: parseInt(document.getElementById('newItemDuration').value) || 0,
        frequency_days: freqDays,
        next_due: initialDue.toISOString(),
        is_active: true
      };

      // Handle End Date
      const endRaw = document.getElementById('newItemEndDate').value;
      if (endRaw && endRaw.trim() !== "") {
        const eParts = endRaw.split('-');
        const localEnd = new Date(eParts[0], eParts[1] - 1, eParts[2], 23, 59, 59);
        newItem.end_date = localEnd.toISOString();
      }

      if (!houseData.house_tasks) houseData.house_tasks = [];
      houseData.house_tasks.push(newItem);
      renderTasks();
      await saveTasks();
      
      // Reset Form
      document.getElementById('newItemTitle').value = '';
      document.getElementById('newItemDuration').value = '';
      document.getElementById('newItemFreq').value = '';
      document.getElementById('newItemStartDate').value = '';
      document.getElementById('newItemEndDate').value = '';
    }

    async function completeTask(id) {
      const idx = houseData.house_tasks.findIndex(t => t.id === id);
      if (idx === -1) return;
      const t = houseData.house_tasks[idx];
      
      // ABSOLUTE FAILSAFE: Ensure frequency is captured
      let freq = 1; 
      if (t.frequency_days === 0) freq = 0;
      else if (!isNaN(parseInt(t.frequency_days))) freq = parseInt(t.frequency_days);

      if (freq === 0 && !t.anchor_day) {
        t.is_active = false; // It's a true one-off
      } else {
        // Find current date to base math on
        const baseDate = new Date();
        baseDate.setHours(0,0,0,0);
        
        const next = new Date(baseDate); 
        next.setDate(next.getDate() + freq);
        t.next_due = next.toISOString();
        
        // Expiration check
        if (t.end_date) {
            const expDate = new Date(t.end_date);
            // If the newly calculated date is technically past the expiration date, kill it.
            if (next > expDate) {
                t.is_active = false;
            }
        }
      }
      
      renderTasks();
      await saveTasks();
    }

    async function saveTasks() {
      setStatus("Saving...");
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(houseData, null, 2))));
      try {
        const res = await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: "Update via App", content, sha: currentSha })
        });
        if (!res.ok) throw new Error("Failed to save");
        const d = await res.json();
        currentSha = d.content.sha;
        setStatus("Saved!");
        setTimeout(() => setStatus(""), 3000);
      } catch (e) { 
        console.error(e);
        setStatus("Save Failed"); 
      }
    }

    fetchTasks();
  </script>
</body>
</html>
