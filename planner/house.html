<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House & Life Manager</title>
  <style>
    :root {
      --bg-color: #f4f4f9;
      --card-bg: #ffffff;
      --text-main: #333333;
      --text-sub: #666666;
      --primary-btn: #0066cc;
      --primary-hover: #005bb5;
      --action-btn: #0066cc;
      --action-hover: #005bb5;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    
    .status-msg {
      text-align: center;
      font-size: 0.9em;
      margin-bottom: 15px;
      color: var(--action-btn);
      height: 20px;
      font-weight: bold;
    }
    
    .add-form-container {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      max-width: 600px;
      margin: 0 auto 20px auto;
    }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;}
    .form-input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex: 1; font-size: 1em; min-width: 120px;}
    .input-group { display: flex; flex-direction: column; flex: 1; }
    .input-label { font-size: 0.8em; color: var(--text-sub); margin-bottom: 3px; font-weight: bold; }
    
    .add-btn {
      background-color: var(--action-btn);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 1em;
      margin-top: 5px;
    }
    
    .task-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    .task-card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 15px 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 8px solid #ccc; 
    }
    
    .color-black { border-left-color: #000000; } 
    .color-red { border-left-color: #d32f2f; }   
    .color-orange { border-left-color: #f57c00; } 
    .color-yellow { border-left-color: #fbc02d; } 
    .color-green { border-left-color: #388e3c; }  
    .color-blue { border-left-color: #1976d2; }   
    .color-purple { border-left-color: #7b1fa2; } 

    .task-info { flex-grow: 1; }
    .task-title { font-size: 1.1em; font-weight: bold; margin: 0 0 5px 0; }
    .task-meta { font-size: 0.85em; color: var(--text-sub); margin: 0; }
    
    .type-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: bold;
      margin-right: 5px;
      text-transform: uppercase;
    }
    .type-reminder { background-color: #f3e5f5; color: #8e24aa; }
    .type-task { background-color: #e3f2fd; color: #1565c0; }
    
    .complete-btn {
      background-color: var(--primary-btn);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 15px;
      font-size: 0.9em;
      font-weight: bold;
      cursor: pointer;
      margin-left: 10px;
    }

    .date-edit-input {
      border: 1px solid transparent;
      background: transparent;
      font-family: inherit;
      color: var(--text-main);
      font-size: 0.9em;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      outline: none;
      font-weight: bold;
    }
    .date-edit-input:hover, .date-edit-input:focus {
      background: #e8e8e8;
      border-color: #ccc;
    }
  </style>
</head>
<body>

  <h1>Manager</h1>
  <div id="statusMessage" class="status-msg">Initial loading...</div>

  <div class="add-form-container">
    <h3 style="margin-top: 0; margin-bottom: 15px;">Add New Item</h3>
    
    <div class="form-row">
      <input type="text" id="newItemTitle" class="form-input" placeholder="Title (e.g., Take Medicine)">
    </div>
    
    <div class="form-row">
      <div class="input-group">
        <span class="input-label">Type</span>
        <select id="newItemType" class="form-input">
          <option value="task">Task</option>
          <option value="reminder">Reminder</option>
        </select>
      </div>
      <div class="input-group">
        <span class="input-label">Mins (If Task)</span>
        <input type="number" id="newItemDuration" class="form-input" placeholder="0">
      </div>
      <div class="input-group">
        <span class="input-label">Repeat Every X Days</span>
        <input type="number" id="newItemFreq" class="form-input" placeholder="Default: 1">
      </div>
    </div>
    
    <div class="form-row">
      <div class="input-group">
        <span class="input-label">Anchor Day (Optional)</span>
        <select id="newItemAnchor" class="form-input">
          <option value="">None (Floating)</option>
          <option value="Sunday">Sunday</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
        </select>
      </div>
    </div>

   <div class="form-row">
      <div class="input-group">
        <span class="input-label">Time (Optional)</span>
        <input type="time" id="newItemTime" class="form-input"> 
      </div>
      <div class="input-group">
        <span class="input-label">Start Date (Optional)</span>
        <input type="date" id="newItemStartDate" class="form-input">
      </div>
      <div class="input-group">
        <span class="input-label">End Date (Optional)</span>
        <input type="date" id="newItemEndDate" class="form-input" title="It will stop after this date">
      </div>
    </div>
    
    <button onclick="addNewItem()" class="add-btn">Add to Tracker</button>
  </div>

  <div id="taskList" class="task-container"></div>

  <script>
    let GITHUB_TOKEN = localStorage.getItem('my_house_token');
    if (!GITHUB_TOKEN) {
      GITHUB_TOKEN = prompt("Enter your GitHub Personal Access Token (starts with ghp_):");
      if (GITHUB_TOKEN) localStorage.setItem('my_house_token', GITHUB_TOKEN);
    }

    const OWNER = 'scottscalici';
    const REPO = 'loquesea';
    const PATH = 'planner/house.json';
    const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

    let houseData = { house_tasks: [] };
    let currentSha = null;

    function setStatus(msg) {
      const statusElement = document.getElementById('statusMessage');
      if (statusElement) statusElement.textContent = msg;
    }

    // --- BULLETPROOF DATE HELPERS ---
    // Ignores all browser timezone offsets by aggressively splitting the string
    function getSafeDate(dateStr) {
        if (!dateStr) return new Date();
        const datePart = dateStr.split('T')[0]; // Grabs just "YYYY-MM-DD"
        const p = datePart.split('-');
        return new Date(p[0], p[1] - 1, p[2], 0, 0, 0); // Force local midnight
    }

    function toLocalDateString(d) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    async function fetchTasks() {
      setStatus("Fetching from GitHub...");
      try {
        const response = await fetch(API_URL, {
          headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!response.ok) throw new Error(`Error: ${response.status}`);
        const data = await response.json();
        currentSha = data.sha;
        const decoded = decodeURIComponent(escape(atob(data.content)));
        houseData = JSON.parse(decoded);
        
        // --- AUTO-HEALER RUNS ON LOAD ---
        let needsSave = false;
        houseData.house_tasks.forEach(t => {
            if (!t.id) {
                t.id = 'id_healed_' + Date.now() + Math.floor(Math.random() * 1000);
                needsSave = true;
            }
            if (t.anchor_day) {
                const cleanAnchor = t.anchor_day.trim().charAt(0).toUpperCase() + t.anchor_day.trim().slice(1).toLowerCase();
                if (t.anchor_day !== cleanAnchor) {
                    t.anchor_day = cleanAnchor;
                    needsSave = true;
                }
            }
            let f = parseInt(t.frequency_days);
            if (isNaN(f)) f = 1;
            if (f === 0 && !t.is_one_off && !t.anchor_day) {
                t.frequency_days = 1; 
                needsSave = true;
            }
            // Fix old timezone-shifted ISO strings into safe YYYY-MM-DD strings
            if (t.next_due && t.next_due.includes('T')) {
                t.next_due = toLocalDateString(getSafeDate(t.next_due));
                needsSave = true;
            }
        });

        renderTasks();
        
        if (needsSave) {
            setStatus("Healing database errors...");
            await saveTasks(true);
        } else {
            setStatus("Ready");
            setTimeout(() => setStatus(""), 3000);
        }
      } catch (e) {
        console.error(e);
        setStatus("Load Error. Check Token.");
      }
    }

    function renderTasks() {
      const container = document.getElementById('taskList');
      container.innerHTML = '';
      const now = new Date();
      now.setHours(0,0,0,0);

      const active = (houseData.house_tasks || []).filter(t => t.is_active);
      
     active.sort((a, b) => {
        // 1. Compare the dates first
        const dateDiff = getSafeDate(a.next_due) - getSafeDate(b.next_due);
        
        // If they are due on different days, sort normally by day
        if (dateDiff !== 0) {
            return dateDiff; 
        }
        
        // 2. If dates are the exact same, sort alphabetically by time
        // We use "23:59" as a fallback so tasks without a time drop to the bottom
        const timeA = a.time || "23:59";
        const timeB = b.time || "23:59";
        
        return timeA.localeCompare(timeB);
      });

      active.forEach(task => {
        const dueDate = getSafeDate(task.next_due);
        const days = Math.round((dueDate - now) / 86400000);
        
        const safeType = task.type || 'task'; 
        
        let sClass = "";
        if (days < 0) sClass = "color-black";
        else if (days === 0) sClass = "color-red";
        else if (days === 1) sClass = "color-orange";
        else if (days === 2) sClass = "color-yellow";
        else if (days >= 3 && days <= 6) sClass = "color-green";
        else if (days >= 7 && days <= 30) sClass = "color-blue";
        else sClass = "color-purple"; 

        const formattedDate = toLocalDateString(dueDate);
        let relativeText = days === 0 ? 'Today' : (days === 1 ? 'Tomorrow' : (days < 0 ? Math.abs(days) + ' days ago' : 'In ' + days + ' days'));

        const card = document.createElement('div');
        card.className = `task-card ${sClass}`;
        card.innerHTML = `
          <div class="task-info">
            <p class="task-title">${task.title}</p>
            <p class="task-meta" style="display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 5px;">
              <span class="type-badge type-${safeType}">${safeType}</span>
              By: <input type="date" class="date-edit-input" value="${formattedDate}" onchange="changeDueDate('${task.id}', this.value)">
              <span style="font-size: 0.85em; opacity: 0.8;">(${relativeText} at ${task.time || 'Anytime'})</span>
            </p>
          </div>
          <button class="complete-btn" onclick="completeTask('${task.id}')">Done</button>
        `;
        container.appendChild(card);
      });
    }

    async function changeDueDate(taskId, newDateStr) {
      if (!newDateStr) return; 
      setStatus("Updating date...");
      const taskIndex = houseData.house_tasks.findIndex(t => t.id === taskId);
      if (taskIndex === -1) return;

      const localDate = getSafeDate(newDateStr);
      houseData.house_tasks[taskIndex].next_due = toLocalDateString(localDate);
      
      renderTasks();
      await saveTasks();
    }

    async function addNewItem() {
      const title = document.getElementById('newItemTitle').value;
      if (!title) return alert("Title required");
      
      const freqRaw = document.getElementById('newItemFreq').value;
      let freqDays = 1;
      if (freqRaw.trim() === "0") {
        freqDays = 0;
      } else if (!isNaN(parseInt(freqRaw))) {
        freqDays = parseInt(freqRaw);
      }

      let initialDue = new Date();
      initialDue.setHours(0,0,0,0);
      
      const startRaw = document.getElementById('newItemStartDate').value;
      const anchorRaw = document.getElementById('newItemAnchor').value;

      // Smart Anchor Creation Math
      if (startRaw && startRaw.trim() !== "") {
        initialDue = getSafeDate(startRaw);
      } else if (anchorRaw !== "") {
        const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const targetIdx = daysOfWeek.indexOf(anchorRaw);
        const currentIdx = initialDue.getDay();
        let diff = targetIdx - currentIdx;
        if (diff < 0) diff += 7; // Jump to the next upcoming occurrence
        initialDue.setDate(initialDue.getDate() + diff);
      }

const timeRaw = document.getElementById('newItemTime').value;

      const newItem = {
        id: `id_${Date.now()}`,
        title: title,
        type: document.getElementById('newItemType').value,
        duration_minutes: parseInt(document.getElementById('newItemDuration').value) || 0,
        frequency_days: freqDays,
        next_due: toLocalDateString(initialDue),
        is_active: true
      };

      if (timeRaw !== "") newItem.time = timeRaw;
      if (anchorRaw !== "") newItem.anchor_day = anchorRaw;

      const endRaw = document.getElementById('newItemEndDate').value;
      if (endRaw && endRaw.trim() !== "") {
        newItem.end_date = toLocalDateString(getSafeDate(endRaw));
      }

      if (!houseData.house_tasks) houseData.house_tasks = [];
      houseData.house_tasks.push(newItem);
      renderTasks();
      await saveTasks();
      
      document.getElementById('newItemTitle').value = '';
      document.getElementById('newItemDuration').value = '';
      document.getElementById('newItemFreq').value = '';
      document.getElementById('newItemAnchor').value = '';
      document.getElementById('newItemStartDate').value = '';
      document.getElementById('newItemEndDate').value = '';
      document.getElementById('newItemTime').value = '';
    }

    async function completeTask(id) {
      try {
          const idx = houseData.house_tasks.findIndex(t => t.id === id);
          if (idx === -1) {
              alert("Error: Couldn't find that task! Try refreshing.");
              return;
          }
          const t = houseData.house_tasks[idx];
          
          let freq = parseInt(t.frequency_days);
          if (isNaN(freq)) freq = 1;

          if (freq === 0 && !t.anchor_day && !t.is_one_off) freq = 1;

          if (freq === 0 && !t.anchor_day) {
            t.is_active = false; 
          } else {
            const now = new Date();
            now.setHours(0,0,0,0);
            
            const currentDue = getSafeDate(t.next_due);
            const baseDate = currentDue > now ? currentDue : now;
            const next = new Date(baseDate); 

            if (t.anchor_day) {
                const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
                const targetIdx = daysOfWeek.indexOf(t.anchor_day);
                
                if (targetIdx !== -1) {
                    const currentIdx = next.getDay();
                    let diff = targetIdx - currentIdx;
                    if (diff <= 0) diff += 7; 
                    next.setDate(next.getDate() + diff);
                } else {
                    next.setDate(next.getDate() + freq);
                }
            } else {
                next.setDate(next.getDate() + freq);
            }
            
            t.next_due = toLocalDateString(next);
            
            if (t.end_date) {
                const expDate = getSafeDate(t.end_date);
                if (next > expDate) t.is_active = false;
            }
          }
          
          renderTasks();
          await saveTasks();
      } catch(err) {
          console.error("Bug caught:", err);
          alert("Something broke when clicking Done! Please check the developer console.");
      }
    }

    async function saveTasks(isSilent = false) {
      if (!isSilent) setStatus("Saving...");
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(houseData, null, 2))));
      try {
        const res = await fetch(API_URL, {
          method: 'PUT',
          headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: "Update via App", content, sha: currentSha })
        });
        if (!res.ok) throw new Error("Failed to save");
        const d = await res.json();
        currentSha = d.content.sha;
        
        if (!isSilent) {
            setStatus("Saved!");
            setTimeout(() => setStatus(""), 3000);
        }
      } catch (e) { 
        console.error(e);
        if (!isSilent) setStatus("Save Failed"); 
      }
    }

    fetchTasks();
  </script>
</body>
</html>
