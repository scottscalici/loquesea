<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Spend Limit</title>
    <style>
        :root { --primary: #2e7d32; --accent: #2196F3; --bg: #f4f4f9; --card: #ffffff; --text: #333; --danger: #d32f2f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 90vh; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; position: relative;}
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }
        .big-amt { font-size: 3.5rem; font-weight: 900; margin: 10px 0; display: block; color: var(--primary); }
        .sub-label { font-size: 1rem; color: #555; margin-bottom: 15px; display: block; }
        .progress-container { background: #eee; height: 12px; border-radius: 6px; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); height: 100%; transition: width 0.5s ease; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; margin-top: 5px; }
        .history-card { background: var(--card); border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .history-title { font-size: 0.75rem; color: #aaa; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; display: block; text-align: left; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; }
        .hist-desc { font-weight: 600; color: #444; }
        .hist-date { font-size: 0.7rem; color: #999; display: block; }
        .hist-amt { font-weight: bold; color: var(--danger); }
        .hist-amt.pos { color: var(--primary); }
        .allowance-badge { position: absolute; top: 15px; right: 15px; font-size: 0.65rem; background: #eee; padding: 4px 8px; border-radius: 10px; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <div class="allowance-badge" id="dayStartBadge">Goal: $0/day</div>
        <span class="label">Available Today</span>
        <span id="dailyLimit" class="big-amt">$0</span>
        <span id="daysLeftMsg" class="sub-label">...</span>
        
        <div class="progress-container">
            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>

     <div class="stats-grid">
            <div class="stat-box">
                <span class="label">Month Left</span>
                <span id="monthlyRemaining" class="stat-val">$0</span>
            </div>
            <div class="stat-box">
                <span class="label">Flex Left</span>
                <span id="flexRemaining" class="stat-val" style="color: var(--accent);">$0</span>
            </div>
            <div class="stat-box">
                <span class="label">Today</span>
                <span id="todaySpend" class="stat-val" style="color:#d32f2f;">$0</span>
            </div>
        </div>
    </div>
        
    <div class="history-card">
        <span class="history-title">Recent Activity</span>
        <div id="recentList"></div>
    </div>

<script>
    const CONFIG = { owner: 'scottscalici', repo: 'loquesea', path: 'planner/bills.json' };

    async function saveToGitHub(data, sha) {
        const TOKEN = localStorage.getItem('gh_token');
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const body = {
            message: "Automatic Dashboard Reset (Monthly/Weekly)",
            content: content,
            sha: sha
        };
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`, {
            method: 'PUT',
            headers: { "Authorization": `token ${TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
    }

    // Helper: Calculate General Spent & Bonus since a specific date
    function getGeneralActivitySince(history, sinceDateStr, now) {
        let spent = 0;
        let bonus = 0;
        history.forEach(item => {
            let itemDateStr = item.date.substring(0, 10);
            if (itemDateStr >= sinceDateStr) {
                const cat = (item.category || "").toUpperCase();
                const vend = (item.vendor || "").toUpperCase();
                const what = (item.what || "").toUpperCase();
                
                const isAmazon = vend.includes("AMAZON") || vend.includes("AMZN");
                const isShieldWindow = now.getDate() >= 21;
                const isShielded = isAmazon && isShieldWindow;
                const isFlex = vend.includes("KROGER") || vend.includes("GAS") || vend.includes("GROCERY") || what.includes("GROCERY");

                // NOW CHECKS BOTH CATEGORY AND VENDOR FOR "BONUS"
                if (cat === "BONUS" || vend === "BONUS") {
                    bonus += Math.abs(item.amount);
                }
                else if (cat !== "BILL" && cat !== "INCOME" && cat !== "SAVINGS" && vend !== "INCOME" && !isShielded && !isFlex) {
                    spent += Math.abs(item.amount);
                }
            }
        });
        return { spent, bonus };
    }

    // Helper: Calculate Flex Spent since a specific date
    function getFlexSpentSince(history, sinceDateStr) {
        let total = 0;
        history.forEach(item => {
            let itemDateStr = item.date.substring(0, 10);
            if (itemDateStr >= sinceDateStr) {
                const cat = (item.category || "").toUpperCase();
                const vend = (item.vendor || "").toUpperCase();
                const what = (item.what || "").toUpperCase();
                
                const isFlex = vend.includes("KROGER") || vend.includes("GAS") || vend.includes("GROCERY") || what.includes("GROCERY");
                if (isFlex && cat !== "INCOME" && cat !== "SAVINGS" && cat !== "BILL") {
                    total += Math.abs(item.amount);
                }
            }
        });
        return total;
    }

    async function init() {
        try {
            const TOKEN = localStorage.getItem('gh_token');
            const resp = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${TOKEN}` },
                cache: 'no-store'
            });
            const fileData = await resp.json();
            const currentSha = fileData.sha;
            let data = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
            
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const todayStr = `${y}-${m}-${d}`; 
            const currentMonthStr = `${y}-${m}`;

            let lastWeeklyReset = data.state.last_weekly_reset ? data.state.last_weekly_reset.substring(0, 10) : "";
            let lastMonthlyResetStr = data.state.last_monthly_reset ? data.state.last_monthly_reset.substring(0, 7) : "";
            
            let needsSave = false;

            if (!data.state.last_monthly_reset) {
                data.state.monthly_general_pool = 2000; 
                data.state.last_monthly_reset = now.toISOString();
                data.state.last_weekly_reset = now.toISOString();
                needsSave = true;
            } 
            else {
                if (currentMonthStr !== lastMonthlyResetStr) {
                    let lastMonthActivity = getGeneralActivitySince(data.history, data.state.last_monthly_reset.substring(0, 10), now);
                    let leftoverGeneral = Math.max(0, (data.state.monthly_general_pool || 0) - lastMonthActivity.spent + lastMonthActivity.bonus);
                    
                    const daysInNewMonth = new Date(y, now.getMonth() + 1, 0).getDate();
                    
                    data.state.monthly_general_pool = (daysInNewMonth * 100) + leftoverGeneral;
                    data.state.last_monthly_reset = now.toISOString();
                    needsSave = true;
                }

                if (now.getDay() === 1 && lastWeeklyReset !== todayStr) {
                    let flexSpent = getFlexSpentSince(data.history, lastWeeklyReset);
                    let flexLeft = Math.max(0, 300 - flexSpent);
                    
                    data.state.monthly_general_pool += flexLeft;
                    data.state.last_weekly_reset = now.toISOString();
                    needsSave = true;
                }
            }

            if (needsSave) {
                await saveToGitHub(data, currentSha);
            }

            updateUI(data);
        } catch (e) { console.error(e); }
    }

    function updateUI(data) {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const todayStr = `${y}-${m}-${d}`; 
        
        let lastWeeklyResetStr = data.state.last_weekly_reset.substring(0, 10);
        let lastMonthlyResetStr = data.state.last_monthly_reset.substring(0, 10);

        const daysInMonth = new Date(y, now.getMonth() + 1, 0).getDate();
        const daysLeftInMonth = daysInMonth - now.getDate() + 1;

        const monthActivity = getGeneralActivitySince(data.history, lastMonthlyResetStr, now);
        const todayActivity = getGeneralActivitySince(data.history, todayStr, now);
        const flexSpentThisWeek = getFlexSpentSince(data.history, lastWeeklyResetStr);

        const startOfMonthPool = data.state.monthly_general_pool || 0;
        
        const trueMonthlyRemaining = startOfMonthPool - monthActivity.spent + monthActivity.bonus;
        const currentFlexLeft = Math.max(0, 300 - flexSpentThisWeek);

        const startOfDayTotal = trueMonthlyRemaining + todayActivity.spent; 
        const finalDailyGoal = startOfDayTotal / daysLeftInMonth;
        
        const availableToday = finalDailyGoal - todayActivity.spent;
        const pct = Math.max(0, Math.min((availableToday / finalDailyGoal) * 100, 100));

        document.getElementById('dailyLimit').innerText = `$${Math.round(availableToday)}`;
        document.getElementById('dayStartBadge').innerText = `Goal: $${Math.round(finalDailyGoal)}/day`;
        document.getElementById('daysLeftMsg').innerText = `Month ends in ${daysLeftInMonth} days`;
        
        document.getElementById('monthlyRemaining').innerText = `$${Math.round(trueMonthlyRemaining).toLocaleString()}`;
        document.getElementById('flexRemaining').innerText = `$${Math.round(currentFlexLeft)}`;
        document.getElementById('todaySpend').innerText = `$${Math.round(todayActivity.spent)}`;
        document.getElementById('progressBar').style.width = pct + '%';
    
        const dailyEl = document.getElementById('dailyLimit');
        if (availableToday <= 0) dailyEl.style.color = 'var(--danger)';
        else dailyEl.style.color = 'var(--primary)';

        const displayItems = data.history.slice().reverse().filter(item => {
            const cat = (item.category || "").toUpperCase();
            const vend = (item.vendor || "").toUpperCase();
            return cat !== "BILL" && cat !== "INCOME" && cat !== "SAVINGS" && vend !== "INCOME";
        }).slice(0, 5);

        const list = document.getElementById('recentList');
        list.innerHTML = displayItems.map(item => {
            let dStr = item.date;
            try {
                const parts = item.date.substring(0, 10).split('-');
                dStr = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parts[1]-1] + " " + parseInt(parts[2]);
            } catch(e) {}

            const cat = (item.category || "").toUpperCase();
            const vend = (item.vendor || "").toUpperCase();
            
            // NOW CHECKS BOTH HERE FOR THE UI DISPLAY
            const isBonus = cat === "BONUS" || vend === "BONUS";
            const amtClass = isBonus ? "hist-amt pos" : "hist-amt";
            const prefix = isBonus ? "+" : "-";

            return `<div class="history-item">
                <div>
                    <span class="hist-desc">${item.vendor || cat}</span>
                    <span class="hist-date">${dStr} ${item.who ? '• ' + item.who : ''}</span>
                </div>
                <span class="${amtClass}">${prefix}$${Math.abs(item.amount).toLocaleString()}</span>
            </div>`;
        }).join('');
    }
    
    init();
</script>

</body>
</html>
<button onclick="localStorage.setItem('gh_token', prompt('Enter Token:'))" style="margin-top:20px; opacity:0.2;">Set Token</button>
